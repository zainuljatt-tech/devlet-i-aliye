<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giriş / Üye Ol | Devlet-i Aliyye Ocakları İstanbul İl Gençlik Kolları</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="subpage">

  <div id="loader-intro">
    <div class="loader-inner">
      <img src="images/logo.png" alt="Devlet-i Aliyye" class="loader-logo">
      <div class="loader-line"></div>
    </div>
  </div>

  <nav>
    <div class="nav-header">
      <div class="logo">
        <a href="index.html"><img src="images/logo.png" alt="Logo"></a>
        <h1>Devlet-i Aliyye Ocakları İstanbul İl Gençlik Kolları Başkanlığı</h1>
      </div>
      <button class="menu-toggle" id="menu-toggle" aria-label="Menü">
        <span></span><span></span><span></span>
      </button>
    </div>
    <ul>
      <li><a href="index.html">Ana Sayfa</a></li>
      <li><a href="hakkimizda.html">Hakkımızda</a></li>
      <li><a href="misyon.html">Misyon</a></li>
      <li><a href="galeri.html">Galeri</a></li>
      <li><a href="teskilat.html">Teşkilat</a></li>
      <li><a href="iletisim.html">İletişim</a></li>
      <li><a href="giris-uye.html" class="active">Giriş / Üye Ol</a></li>
    </ul>
  </nav>

  <section>
    <h2 class="title">Giriş / Üye Ol</h2>
    <div class="auth-container">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="showTab('login')">Giriş Yap</button>
        <button class="auth-tab" onclick="showTab('register')">Üye Ol</button>
      </div>

      <form id="login-form" class="auth-form">
        <input type="email" name="email" placeholder="E-posta Adresiniz" required>
        <input type="password" name="sifre" placeholder="Şifreniz" required>
        <button class="btn" type="submit">Giriş Yap</button>
      </form>

      <form id="register-form" class="auth-form" style="display:none">
        <input type="text" name="ad" placeholder="Adınız" required>
        <input type="text" name="soyad" placeholder="Soyadınız" required>
        <input type="email" name="email" placeholder="E-posta Adresiniz" required>
        <input type="tel" name="telefon" placeholder="Telefon Numaranız" required>
        <button class="btn" type="submit">Üye Ol</button>
      </form>
    </div>
  </section>

  <footer>
    <p>© 2026 Devlet-i Aliyye Ocakları İstanbul İl Gençlik Kolları Başkanlığı</p>
    <p>Osmanlı Ruhuyla Geleceğe...</p>
  </footer>

  <script src="main.js"></script>
  <script>
    const GSHEET_URL = 'https://script.google.com/macros/s/AKfycbz0z2aBnrO5zOwKZvxEgJoTOAy6ds9Ks_4P2JpajlcVtIUF7S2YXyin90-AWruMXtgf/exec';
    const ADMIN_EMAIL = 'ugur.kaplan@devletialiye.com';
    const ADMIN_PASS = 'osmanli2026';
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTaj3fkJxWs-QCIvRO6TaPB4fIjcz1ilR_Dk8V9CsU0N7wpfmOAp-ICvbf8fkyP6xkkgqy7aNPQArp_/pub?output=csv';

    function showTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.style.display = 'none');
      document.querySelector('[onclick="showTab(\'' + tab + '\')"]').classList.add('active');
      document.getElementById(tab + '-form').style.display = 'flex';
    }

    document.getElementById('register-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = this.querySelector('.btn');
      btn.textContent = 'Gönderiliyor...';
      btn.disabled = true;
      try {
        const data = {
          ad: this.ad.value.trim(),
          soyad: this.soyad.value.trim(),
          email: this.email.value.trim(),
          telefon: this.telefon.value.trim()
        };
        await fetch(GSHEET_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(data)
        });
        alert('Kaydınız alındı! Teşekkür ederiz.');
        this.reset();
      } catch(err) {
        alert('Bağlantı hatası. Lütfen tekrar deneyin.');
      }
      btn.textContent = 'Üye Ol';
      btn.disabled = false;
    });

    async function deleteRow(rowNum) {
      if (!confirm('Bu üyeyi silmek istediğinize emin misiniz?')) return;
      try {
        await fetch(GSHEET_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ action: 'delete', row: rowNum, secret: ADMIN_PASS })
        });
        document.getElementById('row-' + rowNum).remove();
        const countEl = document.querySelector('.admin-count strong');
        if (countEl) countEl.textContent = parseInt(countEl.textContent) - 1;
      } catch(err) {
        alert('Silme işlemi başarısız.');
      }
    }

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = this.querySelector('.btn');
      const email = this.email.value.trim();
      const password = this.sifre.value.trim();

      if (email !== ADMIN_EMAIL || password !== ADMIN_PASS) {
        alert('Geçersiz giriş bilgileri.');
        return;
      }

      btn.textContent = 'Yükleniyor...';
      btn.disabled = true;

      try {
        const res = await fetch(CSV_URL + '&_=' + Date.now());
        const csv = await res.text();
        const allLines = csv.split('\n');
        const dataRows = [];
        for (let i = 1; i < allLines.length; i++) {
          const line = allLines[i].trim();
          if (!line) continue;
          const cells = line.split(',').filter(c => c.trim() && c.replace(/"/g, '').trim());
          if (cells.length === 0) continue;
          dataRows.push({ sheetRow: i + 1, raw: allLines[i] });
        }
        const headers = allLines[0].split(',');

        const container = document.querySelector('.auth-container');
        let html = '<div class="admin-panel"><h3>Üye Kayıtları</h3><p class="admin-count">Toplam üye sayısı: <strong>' + dataRows.length + '</strong></p><div class="admin-table-wrap"><table><thead><tr>';
        headers.forEach(h => { html += '<th>' + h.replace(/"/g, '') + '</th>'; });
        html += '<th>İşlem</th></tr></thead><tbody>';
        dataRows.forEach(r => {
          const cells = r.raw.split(',');
          html += '<tr id="row-' + r.sheetRow + '">';
          cells.forEach(c => { html += '<td>' + c.replace(/"/g, '') + '</td>'; });
          html += '<td><button class="btn-delete" onclick="deleteRow(' + r.sheetRow + ')">Sil</button></td>';
          html += '</tr>';
        });
        html += '</tbody></table></div><button class="btn" onclick="location.reload()">Çıkış Yap</button></div>';
        container.innerHTML = html;
      } catch(err) {
        alert('Veri alınamadı: ' + err.message);
        btn.textContent = 'Giriş Yap';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
